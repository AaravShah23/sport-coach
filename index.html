/* ── HEVY-STYLE WORKOUT LOGGER ── */
function WorkoutLogger({onFinish, onCancel, workoutHistory}){
  const [exercises, setExercises] = useState([]);
  const [elapsed, setElapsed] = useState(0);
  const [restTimer, setRestTimer] = useState(null);
  const [showExSearch, setShowExSearch] = useState(false);
  const timerRef = useRef(null);
  const restRef = useRef(null);

  // Live stopwatch
  useEffect(() => {
    timerRef.current = setInterval(() => setElapsed(t => t + 1), 1000);
    return () => clearInterval(timerRef.current);
  }, []);

  // Rest countdown
  useEffect(() => {
    if (!restTimer) return;
    if (restTimer.seconds <= 0) { setRestTimer(null); return; }
    restRef.current = setTimeout(() => setRestTimer(r => r ? {...r, seconds: r.seconds - 1} : null), 1000);
    return () => clearTimeout(restRef.current);
  }, [restTimer]);

  const fmt = s => `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  const completedSets = exercises.reduce((t, ex) => t + ex.sets.filter(s => s.completed).length, 0);
  const totalVolume = exercises.reduce((t, ex) => t + ex.sets
    .filter(s => s.completed && ex.type === 'weighted')
    .reduce((sv, s) => sv + (parseFloat(s.w)||0) * (parseInt(s.r)||0), 0), 0);

  function addExercise(libEx) {
    const prev = getPreviousValues(libEx.name, workoutHistory);
    setExercises(exs => [...exs, {
      id: Date.now() + Math.random(),
      name: libEx.name,
      color: libEx.color,
      type: libEx.type,
      muscle: libEx.muscle,
      // one empty set pre-filled with previous values if they exist
      sets: [{
        w: prev[0]?.w || '',
        r: prev[0]?.r || '',
        completed: false,
        isPR: false,
      }],
      prevValues: prev,
    }]);
    setShowExSearch(false);
  }

  function updateSet(exId, si, field, val) {
    setExercises(exs => exs.map(ex => {
      if (ex.id !== exId) return ex;
      return {...ex, sets: ex.sets.map((s, i) => i === si ? {...s, [field]: val} : s)};
    }));
  }

  function toggleComplete(exId, si) {
    setExercises(exs => exs.map(ex => {
      if (ex.id !== exId) return ex;
      const sets = ex.sets.map((s, i) => {
        if (i !== si) return s;
        const nowDone = !s.completed;
        const pr = nowDone && ex.type === 'weighted' && parseFloat(s.w) > 0
          && isPRCheck(ex.name, parseFloat(s.w), workoutHistory);
        if (nowDone) setRestTimer({seconds: 90, total: 90});
        return {...s, completed: nowDone, isPR: pr};
      });
      return {...ex, sets};
    }));
  }

  function addSet(exId) {
    setExercises(exs => exs.map(ex => {
      if (ex.id !== exId) return ex;
      const last = ex.sets[ex.sets.length - 1];
      const nextPrev = ex.prevValues?.[ex.sets.length];
      return {...ex, sets: [...ex.sets, {
        w: last?.w || nextPrev?.w || '',
        r: last?.r || nextPrev?.r || '',
        completed: false, isPR: false,
      }]};
    }));
  }

  function removeSet(exId, si) {
    setExercises(exs => exs.map(ex => {
      if (ex.id !== exId || ex.sets.length <= 1) return ex;
      return {...ex, sets: ex.sets.filter((_, i) => i !== si)};
    }));
  }

  function removeExercise(exId) {
    setExercises(exs => exs.filter(ex => ex.id !== exId));
  }

  return (
    <div className="wl-fullscreen">
      {showExSearch && (
        <ExSearchSheet onSelect={addExercise} onClose={() => setShowExSearch(false)}/>
      )}

      {/* Top bar */}
      <div className="wl-topbar">
        <div className="wl-timer">{fmt(elapsed)}</div>
        <div className="wl-stats">
          <div className="wl-stat">
            <div className="wl-stat-val">{completedSets}</div>
            <div className="wl-stat-label">Sets</div>
          </div>
          <div className="wl-stat">
            <div className="wl-stat-val">{totalVolume > 0 ? `${Math.round(totalVolume/1000*10)/10}k` : '0'}</div>
            <div className="wl-stat-label">kg vol</div>
          </div>
        </div>
        <button className="wl-finish-top"
          onClick={() => onFinish(exercises, elapsed)}
          style={exercises.length===0?{opacity:.4,cursor:'not-allowed'}:{}}>
          Finish
        </button>
        <button style={{background:'none',border:'1px solid var(--border)',
          color:'var(--muted2)',cursor:'pointer',fontSize:13,padding:'6px 14px',
          fontFamily:'var(--font-b)',borderRadius:4,whiteSpace:'nowrap'}}
          onClick={onCancel}>← Back</button>
      </div>

      {/* Body */}
      <div className="wl-body">

        {/* Empty state */}
        {exercises.length === 0 && (
          <div style={{padding:'60px 24px 32px',textAlign:'center'}}>
            <div style={{fontSize:52,marginBottom:16}}>🏋️</div>
            <div style={{fontFamily:'var(--font-d)',fontSize:28,color:'var(--muted)',
              letterSpacing:'.04em',marginBottom:8}}>EMPTY WORKOUT</div>
            <div style={{fontSize:13,color:'var(--muted)',lineHeight:1.7,marginBottom:32}}>
              Tap the button below to add your first exercise.<br/>
              Build your session one exercise at a time.
            </div>
          </div>
        )}

        {/* Exercise blocks */}
        {exercises.map(ex => (
          <div key={ex.id} className="wl-ex-block">
            {/* Exercise header */}
            <div className="wl-ex-header">
              <div className="wl-ex-color-dot" style={{background: ex.color}}/>
              <div style={{flex:1}}>
                <div className="wl-ex-title">{ex.name}</div>
                <div className="wl-ex-type">
                  {ex.muscle}{ex.type==='bodyweight'?' · Bodyweight':ex.type==='duration'?' · Duration':''}
                </div>
              </div>
              <button className="wl-ex-menu" title="Remove exercise"
                onClick={() => removeExercise(ex.id)}>×</button>
            </div>

            {/* Column headers */}
            <div style={{display:'grid',
              gridTemplateColumns: ex.type==='bodyweight'||ex.type==='duration'
                ? '32px 1fr 1fr 40px'
                : '32px 1fr 1fr 1fr 40px',
              gap:0,padding:'6px 14px',background:'rgba(0,0,0,.25)',
              borderTop:'1px solid var(--border)'}}>
              <div style={{fontSize:9,letterSpacing:'.15em',textTransform:'uppercase',
                color:'var(--muted)'}}>SET</div>
              <div style={{fontSize:9,letterSpacing:'.15em',textTransform:'uppercase',
                color:'var(--muted)',textAlign:'center'}}>PREV</div>
              {ex.type!=='bodyweight'&&ex.type!=='duration'&&(
                <div style={{fontSize:9,letterSpacing:'.15em',textTransform:'uppercase',
                  color:'var(--muted)',textAlign:'center'}}>KG</div>
              )}
              <div style={{fontSize:9,letterSpacing:'.15em',textTransform:'uppercase',
                color:'var(--muted)',textAlign:'center'}}>
                {ex.type==='duration'?'SECS':'REPS'}
              </div>
              <div style={{fontSize:9,letterSpacing:'.15em',textTransform:'uppercase',
                color:'var(--muted)',textAlign:'center'}}>✓</div>
            </div>

            {/* Sets */}
            {ex.sets.map((s, si) => (
              <div key={si} className={`wl-set-row-tr`}
                style={{
                  display:'grid',
                  gridTemplateColumns: ex.type==='bodyweight'||ex.type==='duration'
                    ? '32px 1fr 1fr 40px'
                    : '32px 1fr 1fr 1fr 40px',
                  gap:0,
                  padding:'2px 14px',
                  borderTop:'1px solid #1a1a1a',
                  background: s.completed ? 'rgba(212,240,65,.04)' : 'transparent',
                  alignItems:'center',
                }}>

                {/* Set number — long press to delete */}
                <div className={`wl-set-num-cell${s.completed?' completed':''}`}
                  style={{cursor: si>0 ? 'pointer':'default', userSelect:'none',
                    display:'flex',alignItems:'center',gap:3}}
                  onClick={() => si > 0 && removeSet(ex.id, si)}>
                  {si+1}
                  {s.isPR && <span className="wl-pr-badge">PR</span>}
                </div>

                {/* Previous value */}
                <div className="wl-prev-cell">
                  {ex.prevValues?.[si] ? (
                    <span>
                      {ex.type==='weighted' && ex.prevValues[si].w ? `${ex.prevValues[si].w}kg · ` : ''}
                      {ex.prevValues[si].r}{ex.type==='duration'?'s':' reps'}
                    </span>
                  ) : <span style={{color:'var(--muted)',fontSize:11}}>—</span>}
                </div>

                {/* Weight input (weighted only) */}
                {ex.type!=='bodyweight'&&ex.type!=='duration'&&(
                  <input className={`wl-set-inp${s.completed?' completed':''}`}
                    type="number" inputMode="decimal"
                    placeholder={ex.prevValues?.[si]?.w||'kg'}
                    value={s.w}
                    onChange={e => updateSet(ex.id, si, 'w', e.target.value)}/>
                )}

                {/* Reps / duration input */}
                <input className={`wl-set-inp${s.completed?' completed':''}`}
                  type="number" inputMode="numeric"
                  placeholder={ex.type==='duration'?'sec':ex.prevValues?.[si]?.r||'reps'}
                  value={s.r}
                  onChange={e => updateSet(ex.id, si, 'r', e.target.value)}/>

                {/* Complete checkbox */}
                <button className={`wl-check-btn${s.completed?' done':''}`}
                  onClick={() => toggleComplete(ex.id, si)}>
                  {s.completed ? '✓' : ''}
                </button>
              </div>
            ))}

            {/* Add set */}
            <div className="wl-add-set-row" onClick={() => addSet(ex.id)}>
              <span style={{fontSize:15,color:'var(--lime)'}}>＋</span>
              <span className="wl-add-set-txt">Add Set</span>
            </div>
          </div>
        ))}

        {/* THE main button — always visible, always at the bottom */}
        <button className="add-ex-btn-bottom"
          style={exercises.length===0?{
            borderColor:'var(--lime)',color:'var(--lime)',
            background:'rgba(212,240,65,.06)',fontSize:16,padding:'20px',
            letterSpacing:'.08em',fontFamily:'var(--font-d)',
          }:{}}
          onClick={() => setShowExSearch(true)}>
          {exercises.length===0 ? '＋ ADD EXERCISE' : '＋ Add Exercise'}
        </button>

        <div style={{height:80}}/>
      </div>

      {/* Rest timer */}
      {restTimer && (
        <div className="rest-timer-bar">
          <div className="rest-timer-num">{fmt(restTimer.seconds)}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:11,color:'var(--muted2)',marginBottom:4}}>Rest · Next set in</div>
            <div style={{height:3,background:'var(--border)',borderRadius:2,overflow:'hidden'}}>
              <div style={{height:'100%',background:'var(--lime)',
                width:`${(restTimer.seconds/restTimer.total)*100}%`,
                transition:'width 1s linear'}}/>
            </div>
          </div>
          <div style={{display:'flex',gap:4}}>
            <button style={{background:'none',border:'1px solid var(--border)',
              color:'var(--muted)',padding:'4px 8px',cursor:'pointer',fontSize:11,
              fontFamily:'var(--font-b)',borderRadius:4}}
              onClick={() => setRestTimer(r => r?{...r,seconds:r.seconds+15}:null)}>+15s</button>
            <button className="rest-skip-btn" onClick={() => setRestTimer(null)}>Skip</button>
          </div>
        </div>
      )}
    </div>
  );
}

function getPreviousValues(exName, history) {
  if (!history) return [];
  const lower = exName.toLowerCase();
  const sorted = Object.entries(history).sort((a,b) => b[0].localeCompare(a[0]));
  for (const [, session] of sorted) {
    const found = session[lower] || session[exName];
    if (found) return found.map(s => ({w: s.w||'', r: s.r||''}));
  }
  return [];
}

function isPRCheck(exName, weight, history) {
  if (!history || !weight) return false;
  const lower = exName.toLowerCase();
  for (const [date, session] of Object.entries(history)) {
    if (date === todayKey()) continue;
    const sets = session[lower] || session[exName] || [];
    if (sets.some(s => parseFloat(s.w) >= weight)) return false;
  }
  return weight > 0;
}

  const [showDrop, setShowDrop] = useState(true);
  const debounceRef             = useRef(null);

  useEffect(() => {
    if (!query.trim()) {
      setResults(LOCAL_FOODS);
      setLoading(false);
      return;
    }
    const local = LOCAL_FOODS.filter(f => f.name.toLowerCase().includes(query.toLowerCase()));
    if (local.length > 0) setResults(local);
    clearTimeout(debounceRef.current);
    setLoading(true);
    debounceRef.current = setTimeout(async () => {
      try {
        const url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=12&fields=product_name,brands,nutriments`;
        const res = await fetch(url);
        const data = await res.json();
        const products = (data.products || [])
          .filter(p => p.product_name && p.nutriments && p.nutriments['energy-kcal_100g'] != null && p.nutriments.proteins_100g != null)
          .map(p => {
            const n = p.nutriments;
            return {
              name: p.product_name,
              brand: p.brands || '',
              per100g: {
                kcal: Math.round(n['energy-kcal_100g'] || n['energy-kcal'] || 0),
                p: Math.round((n.proteins_100g || 0) * 10) / 10,
                c: Math.round((n.carbohydrates_100g || 0) * 10) / 10,
                f: Math.round((n.fat_100g || 0) * 10) / 10,
              },
              modes: ['weight'],
              emoji: '🍽',
              live: true,
            };
          });
        const localMatches = LOCAL_FOODS.filter(f => f.name.toLowerCase().includes(query.toLowerCase()));
        const merged = [
          ...localMatches,
          ...products.filter(p => !localMatches.some(l => l.name.toLowerCase() === p.name.toLowerCase())),
        ].slice(0, 15);
        setResults(merged.length > 0 ? merged : localMatches);
      } catch { /* keep local results */ }
      finally { setLoading(false); }
    }, 400);
    return () => clearTimeout(debounceRef.current);
  }, [query]);

  function calcMacros(food, qtyVal, modeVal) {
    if (!food || !qtyVal) return {kcal:0,p:0,c:0,f:0};
    let grams = parseFloat(qtyVal) || 0;
    if (modeVal === 'pieces') grams = grams * (food.pieceWeight || 100);
    const r = grams / 100;
    return {
      kcal: Math.round(food.per100g.kcal * r),
      p:    Math.round(food.per100g.p * r * 10) / 10,
      c:    Math.round(food.per100g.c * r * 10) / 10,
      f:    Math.round(food.per100g.f * r * 10) / 10,
    };
  }

  const preview = calcMacros(selected, qty, mode);

  function selectFood(food) {
    setSelected(food);
    setMode(food.modes[0]);
    setQuery(food.name + (food.brand ? ` (${food.brand})` : ''));
    setQty('');
    setShowDrop(false);
  }

  function confirmAdd() {
    if (!selected || !qty) return;
    const macros = calcMacros(selected, qty, mode);
    const label = mode === 'pieces'
      ? `${qty} × ${selected.name}`
      : `${qty}${selected.unitLabel||'g'} ${selected.name}`;
    onAdd({id: Date.now(), name: label, ...macros});
  }

  const macroColors = {kcal:'#f472b6', p:'var(--lime)', c:'var(--blue)', f:'var(--orange)'};

  return (
    <div>
      <div className="food-search-wrap">
        <div className="food-search-input-row">
          <input
            className="food-search-inp"
            placeholder="Search any food..."
            value={query}
            autoFocus
            onChange={e => { setQuery(e.target.value); setSelected(null); setQty(''); setShowDrop(true); }}
          />
          {loading && <div className="food-spinner"/>}
          {!loading && query.length > 0 && (
            <button className="food-search-clear"
              onClick={() => { setQuery(''); setSelected(null); setQty(''); setShowDrop(true); setResults(LOCAL_FOODS); }}>×</button>
          )}
        </div>

        {showDrop && !selected && (
          <div className="food-dropdown">
            {results.map((food, i) => (
              <div key={i} className="food-option" onClick={() => selectFood(food)}>
                <span style={{fontSize:18,flexShrink:0}}>{food.emoji}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div className="food-option-name">{food.name}</div>
                  {food.brand && <div className="food-option-brand">{food.brand}</div>}
                </div>
                <span className="food-option-cal">{food.per100g.kcal} kcal/100g</span>
                {food.live && <span className="food-source-tag">LIVE</span>}
              </div>
            ))}
            {loading && (
              <div className="food-searching">
                <div className="food-spinner"/>
                Searching 3 million foods...
              </div>
            )}
            {!loading && results.length === 0 && (
              <div className="food-no-results">No results for "{query}"</div>
            )}
          </div>
        )}
      </div>

      {selected && (
        <div className="food-qty-card">
          <div className="food-qty-name">
            <span>{selected.emoji}</span>
            <span style={{flex:1}}>{selected.name}</span>
            <button style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:12,fontFamily:'var(--font-b)'}}
              onClick={() => { setSelected(null); setShowDrop(true); setQuery(''); }}>
              Change ×
            </button>
          </div>

          {(selected.modes?.length > 1) && (
            <div className="food-qty-toggle">
              {selected.modes.map(m => (
                <button key={m} className={`qty-mode-btn${mode===m?' on':''}`}
                  onClick={() => { setMode(m); setQty(''); }}>
                  {m === 'pieces' ? '# Pieces' : 'Weight (g)'}
                </button>
              ))}
            </div>
          )}

          <div className="food-qty-input-row">
            <input
              className="food-qty-inp"
              type="number" inputMode="decimal" autoFocus
              placeholder={mode === 'pieces' ? '1' : '100'}
              value={qty}
              onChange={e => setQty(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && qty && confirmAdd()}
            />
            <span className="food-qty-unit">
              {mode === 'pieces' ? (selected.name.endsWith('s') ? '' : 's') : (selected.unitLabel || 'g')}
            </span>
          </div>

          {parseFloat(qty) > 0 && (
            <div className="food-macro-preview">
              {[
                {k:'kcal',label:'Calories',val:preview.kcal},
                {k:'p',   label:'Protein', val:`${preview.p}g`},
                {k:'c',   label:'Carbs',   val:`${preview.c}g`},
                {k:'f',   label:'Fat',     val:`${preview.f}g`},
              ].map(m => (
                <div key={m.k} className="fmp-cell">
                  <div className="fmp-val" style={{color:macroColors[m.k]}}>{m.val}</div>
                  <div className="fmp-label">{m.label}</div>
                </div>
              ))}
            </div>
          )}

          <button className="food-add-confirm"
            style={!qty ? {opacity:.4,cursor:'not-allowed'} : {}}
            onClick={confirmAdd}>
            ADD TO {slot.toUpperCase()} →
          </button>
          <div className="food-cancel-link" onClick={onCancel}>Cancel</div>
        </div>
      )}

      {!selected && (
        <div style={{padding:'4px 14px 10px'}}>
          <button style={{background:'none',border:'none',color:'var(--muted)',fontSize:12,cursor:'pointer',fontFamily:'var(--font-b)'}}
            onClick={onCancel}>Cancel</button>
        </div>
      )}
    </div>
  );
}
/* ── NUTRITION TRACKER ── */
const MEAL_SLOTS = ['Breakfast', 'Lunch', 'Dinner', 'Snacks'];

function NutritionTracker({targetKcal, targetProtein, targetCarbs, targetFat}){
  const [selectedDate, setSelectedDate] = useState(todayKey());
  const [journal, setJournal] = useState(() => {
    try { return JSON.parse(localStorage.getItem('sc_journal') || '{}'); } catch { return {}; }
  });
  const [addingTo, setAddingTo] = useState(null);
  const [expanded, setExpanded] = useState({Breakfast:true,Lunch:true,Dinner:true,Snacks:false});

  useEffect(() => {
    try { localStorage.setItem('sc_journal', JSON.stringify(journal)); } catch {}
  }, [journal]);

  const dayData = journal[selectedDate] || {meals:{}};
  const allFoods = MEAL_SLOTS.flatMap(s => dayData.meals?.[s] || []);
  const totals = {
    kcal: allFoods.reduce((s,f) => s+(f.kcal||0), 0),
    p:    allFoods.reduce((s,f) => s+(f.p||0), 0),
    c:    allFoods.reduce((s,f) => s+(f.c||0), 0),
    f:    allFoods.reduce((s,f) => s+(f.f||0), 0),
  };

  function navDate(delta) {
    const d = new Date(selectedDate + 'T12:00:00');
    d.setDate(d.getDate() + delta);
    const next = d.toISOString().slice(0,10);
    if (next <= todayKey()) setSelectedDate(next);
  }

  function removeFood(slot, id) {
    setJournal(j => {
      const day = j[selectedDate] || {meals:{}};
      return {...j, [selectedDate]: {...day, meals: {
        ...day.meals, [slot]: (day.meals?.[slot]||[]).filter(f => f.id !== id)
      }}};
    });
  }

  const pct = (val, target) => target > 0 ? Math.min(100, Math.round(val/target*100)) : 0;
  const macroColor = {kcal:'#f472b6', p:'var(--lime)', c:'var(--accent3)', f:'var(--orange)'};
  const macroLabels = {kcal:'Calories', p:'Protein', c:'Carbs', f:'Fat'};

  const dateLabel = selectedDate === todayKey() ? 'Today'
    : new Date(selectedDate+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});

  return (
    <div className="nutr-screen">
      <div style={{padding:'0 16px 14px',fontFamily:'var(--font-d)',fontSize:'38px',letterSpacing:'.03em'}}>
        Nutrition
      </div>

      {/* Date nav */}
      <div className="nutr-date-nav">
        <button className="nutr-date-arrow" onClick={() => navDate(-1)}>‹</button>
        <div className="nutr-date-label">{dateLabel}</div>
        <button className="nutr-date-arrow" onClick={() => navDate(1)}
          style={{opacity: selectedDate === todayKey() ? .3 : 1}}>›</button>
      </div>

      {/* Macro rings */}
      <div className="nutr-macro-rings">
        {['kcal','p','c','f'].map(key => {
          const target = key==='kcal'?targetKcal:key==='p'?targetProtein:key==='c'?targetCarbs:targetFat;
          const val = totals[key];
          const p = pct(val, target);
          const over = val > target;
          return (
            <div key={key} className="nutr-ring">
              <div className="nutr-ring-bar" style={{
                width:`${Math.min(100,p)}%`,
                background: over ? 'var(--red)' : macroColor[key]
              }}/>
              <div className="nutr-ring-val" style={{color: over?'var(--red)':macroColor[key]}}>
                {key==='kcal' ? Math.round(val) : `${Math.round(val)}g`}
              </div>
              <div className="nutr-ring-target">
                {key==='kcal' ? `/ ${target}` : `/ ${target}g`}
              </div>
              <div className="nutr-ring-pct" style={{color: over?'var(--red)':p>=80?macroColor[key]:'var(--muted)'}}>
                {macroLabels[key]}
              </div>
            </div>
          );
        })}
      </div>

      {/* Meal slots */}
      {MEAL_SLOTS.map(slot => {
        const foods = dayData.meals?.[slot] || [];
        const slotKcal = foods.reduce((s,f) => s+(f.kcal||0), 0);
        const isOpen = expanded[slot];
        return (
          <div key={slot} className="nutr-meal-block">
            <div className="nutr-meal-header"
              onClick={() => setExpanded(e => ({...e, [slot]: !e[slot]}))}>
              <div className="nutr-meal-name">{slot}</div>
              <div className="nutr-meal-kcal">{foods.length > 0 ? `${slotKcal} kcal` : 'empty'}</div>
              <div className="nutr-meal-chevron"
                style={{transform: isOpen ? 'rotate(90deg)' : 'none'}}>›</div>
            </div>

            {isOpen && (
              <>
                {foods.map(food => (
                  <div key={food.id} className="nutr-food-row">
                    <div className="nutr-food-name-txt">{food.name}</div>
                    <div className="nutr-food-macros-txt">
                      <span style={{color:'var(--lime)',fontWeight:500}}>{food.kcal} kcal</span><br/>
                      <span style={{color:'var(--muted)'}}>{food.p}P · {food.c}C · {food.f}F</span>
                    </div>
                    <button className="nutr-food-del" onClick={() => removeFood(slot, food.id)}>×</button>
                  </div>
                ))}

                {/* Add food — search database */}
                {addingTo === slot ? (
                  <FoodSearch
                    slot={slot}
                    onAdd={(item) => {
                      setJournal(j => {
                        const day = j[selectedDate] || {meals:{}};
                        const existing = day.meals?.[slot] || [];
                        return {...j, [selectedDate]: {...day, meals: {...day.meals, [slot]: [...existing, item]}}};
                      });
                      setAddingTo(null);
                    }}
                    onCancel={() => setAddingTo(null)}
                  />
                ) : (
                  <div style={{padding:'10px 14px'}}>
                    <button style={{background:'none',border:'none',color:'var(--lime)',
                      fontSize:13,cursor:'pointer',fontFamily:'var(--font-b)',
                      letterSpacing:'.04em'}}
                      onClick={() => setAddingTo(slot)}>
                      ＋ Add food
                    </button>
                  </div>
                )}
              </>
            )}
          </div>
        );
      })}

      <div style={{height:20}}/>
    </div>
  );
}

/* ── UPLOAD SHEET ── */
function UploadSheet({onClose,onPost}){
  const [tag,setTag]=useState('moment');
  const [caption,setCaption]=useState('');
  const [src,setSrc]=useState(null);
  const fileRef=useRef(null);

  function readFile(file){
    if(!file)return;
    const r=new FileReader();
    r.onload=e=>setSrc(e.target.result);
    r.readAsDataURL(file);
  }

  return(
    <div className="overlay" onClick={e=>{if(e.target.className==='overlay')onClose()}}>
      <div className="sheet">
        <div className="sheet-handle"/>
        <button className="sheet-back-btn" onClick={onClose}>Back</button>
        <div className="sheet-title">Share a Moment</div>
        <div className="sheet-sub">PRs, sessions, wins — celebrate with your crew</div>

        {src?(
          <img src={src} className="preview-img" alt="preview"/>
        ):(
          <div className="upload-zone" onClick={()=>fileRef.current?.click()}>
            <input ref={fileRef} type="file" accept="image/*,video/*" style={{display:'none'}}
              onChange={e=>readFile(e.target.files[0])}/>
            <span className="upload-icon">📸</span>
            <div className="upload-label">Tap to add photo or video</div>
            <div className="upload-sub">Optional — you can post text only</div>
          </div>
        )}

        <div className="tag-row">
          {[['pr','🏆 PR'],['moment','📸 Session'],['milestone','🎯 Milestone'],['fun','😂 Fun']].map(([t,l])=>(
            <button key={t} className={`tag-chip${tag===t?' on '+t:''}`} onClick={()=>setTag(t)}>{l}</button>
          ))}
        </div>

        <textarea className="caption-input" placeholder="What happened? Talk your sh*t 💪"
          value={caption} onChange={e=>setCaption(e.target.value)}/>

        <button className="finish-btn"
          style={!caption&&!src?{opacity:.4,cursor:'not-allowed'}:{}}
          onClick={()=>{if(caption||src)onPost({type:tag,text:caption,src})}}>
          POST →
        </button>
      </div>
    </div>
  );
}
